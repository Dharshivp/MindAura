<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MindAura | Student Directory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #2d3e50;
            --therapist-green: #4a7c59;
            --soft-bg: #f4f7f6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--soft-bg);
            display: flex;
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            background: var(--sidebar-bg);
            color: white;
            padding: 30px 20px;
            position: fixed;
        }

        .main-content {
            margin-left: 320px;
            padding: 40px;
            width: 100%;
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .student-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #eee;
        }

        .avatar-circle {
            width: 70px;
            height: 70px;
            background: #e9ecef;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #2d3e50;
        }

        .btn-view {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--therapist-green);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .back-link {
            color: white;
            text-decoration: none;
            display: block;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="/counselor/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <h2>Staff Portal</h2>
    <p>Student Directory</p>
</div>

<div class="main-content">
    <h1>All Registered Students</h1>
    <p>Select a student to view their emotional history and stress analysis.</p>

    <div class="student-grid">
        {% for student in students %}
        <div class="student-card">
            <div class="avatar-circle">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h3>{{ student.name }}</h3>
            <p style="color: #666; font-size: 0.9rem;">{{ student.college or 'No College Listed' }}</p>
            <a href="/counselor/student_profile/{{ student.id }}" class="btn-view">View Analytics</a>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
