<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Session | MindAura</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --therapist: #4a7c59; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }

        /* Left Sidebar: Student Info */
        .info-panel { width: 300px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        
        /* Center: Chat Area */
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        .messages-container { flex-grow: 1; overflow-y: auto; padding: 20px; background: #fafafa; }
        
        /* Chat Bubbles */
        .bubble { margin: 10px 0; padding: 12px 16px; border-radius: 15px; max-width: 70%; line-height: 1.4; }
        .counselor-bubble { background: var(--therapist); color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px; }
        .student-bubble { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Input Area */
        .input-box { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        textarea { flex-grow: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px; resize: none; height: 50px; }
        
        .btn-send { background: var(--therapist); color: white; border: none; border-radius: 8px; padding: 0 20px; cursor: pointer; }
        .btn-end { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="info-panel">
    <div style="text-align: center; margin-bottom: 20px;">
        <div style="width: 80px; height: 80px; background: #eee; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
            {{ student.name[0] }}
        </div>
        <h3>{{ student.name }}</h3>
        <p style="color: #666; font-size: 0.9rem;">Current Session: Active</p>
    </div>
    <hr>
    <h4>Private Notes</h4>
    <textarea style="width: 90%; height: 150px; font-size: 0.8rem; border-color: #eee;" placeholder="Type observations here (only you can see these)..."></textarea>
    <p style="font-size: 0.7rem; color: #999; margin-top: 10px;">Notes are saved automatically to the student's profile.</p>
</div>

<div class="chat-main">
    <div class="chat-header">
        <span><i class="fas fa-circle" style="color: #28a745; font-size: 0.7rem;"></i> Secure Consultation</span>
        <a href="/counselor/dashboard" class="btn-end">End Session</a>
    </div>

    <div class="messages-container" id="chat-flow">
        <div class="bubble student-bubble">Hello, thank you for accepting my request.</div>
        <div class="bubble counselor-bubble">Hello {{ student.name }}, I'm here to listen. How are you feeling right now?</div>
    </div>

    <div class="input-box">
        <textarea id="msg-text" placeholder="Type your professional response..."></textarea>
        <button class="btn-send" id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    $("#send-btn").click(function() {
        const text = $("#msg-text").val();
        if(!text) return;

        // Append to UI
        $("#chat-flow").append(`<div class="bubble counselor-bubble">${text}</div>`);
        $("#msg-text").val('');
        
        // Scroll to bottom
        $("#chat-flow").scrollTop($("#chat-flow")[0].scrollHeight);

        // Here you would add an AJAX call to save this message to your 'CounselorChat' table
    });
</script>

</body>
</html>
